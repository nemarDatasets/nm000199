abstract: Using traditional approaches, a brain-computer interface (BCI) requires the collection of calibration data for new
  subjects prior to online use. This work introduces learning from label proportions (LLP) to the BCI community as a new unsupervised,
  and easy-to-implement classification approach for ERP-based BCIs. The LLP estimates the mean target and non-target responses
  based on known proportions of these two classes in different groups of the data. We present a visual ERP speller to meet
  the requirements of LLP. For evaluation, we ran simulations on artificially created data sets and conducted an online BCI
  study with 13 subjects performing a copy-spelling task. Theoretical considerations show that LLP is guaranteed to minimize
  the loss function similar to a corresponding supervised classifier. LLP performed well in simulations and in the online
  application, where 84.5% of characters were spelled correctly on average without prior calibration.
