methodology: 'The experiment used a modified visual ERP speller with a 6×7 grid. Two distinct stimulus sequences with different
  target/non-target ratios were used: sequence 1 had 3 targets in 8 stimuli, sequence 2 had 2 targets in 18 stimuli. Each
  trial consisted of 4 sequences of length 8 and 2 sequences of length 18, totaling 68 highlighting events per character.
  The LLP algorithm exploited these known proportions to reconstruct mean target and non-target ERP responses without requiring
  labeled data. The classifier was reset at the start of each sentence and retrained after each character. Subjects spelled
  a German pangram sentence three times. One subject (S2) had prior EEG experience; others were naive. Sessions lasted about
  3 hours including setup. Participants were compensated 8 Euros per hour.'
